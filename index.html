<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio - Maleta Viajante | Atitude Kids</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuabcxvJJvQU8EvzkLDXTzlg__yU1Mtghx3A&s" alt="Atitude Kids Logo" class="logo">
        
        <h1>Maleta Viajante</h1>
        <p>Cole a lista de crianças abaixo (um nome por linha):</p>
        
        <textarea id="listaNomes" placeholder="Exemplo:&#10;Davi&#10;Manuela..."></textarea>
        
        <button onclick="realizarSorteio()">Sortear Agora</button>

        <div class="historico-container">
            <h2>Histórico de Sorteados</h2>
            <ul id="listaHistorico"></ul>
            <button class="btn-secundario" onclick="limparHistorico()">Limpar Histórico</button>
        </div>
    </div>

    <div id="modalVencedor" class="modal-overlay">
        <div class="modal-content">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuabcxvJJvQU8EvzkLDXTzlg__yU1Mtghx3A&s" alt="Logo Kids" class="logo-pequena">
            <h3>🎉 TEMOS UM VENCEDOR! 🎉</h3>
            <p id="mensagemVencedor"></p>
            <div id="nomeSorteadoDestaque" class="nome-sorteado"></div>
            
            <div class="modal-actions">
                <button class="btn-confirmar" onclick="aceitarVencedor()">Confirmar e Salvar</button>
                <button class="btn-cancelar" onclick="fecharModal()">Tentar Novamente</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
