<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio - Maleta Viajante | Atitude Kids</title>
    <style>
        /* Reset básico e tipografia */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9; /* Branco levemente off-white para contraste */
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container principal do sorteio */
        .container {
            background-color: #ffffff;
            text-align: center;
            padding: 2.5rem 2rem;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 16px;
            border-top: 8px solid #FF7500; /* Destaque na cor principal */
        }

        /* Estilo da Logo */
        .logo {
            max-width: 140px;
            margin-bottom: 1.5rem;
            border-radius: 50%; /* Deixa a logo redondinha se houver bordas extras */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Títulos e Textos */
        h1 {
            color: #000000;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        p {
            color: #555555;
            margin-bottom: 1.5rem;
        }

        /* Caixa de texto para os nomes */
        textarea {
            width: 100%;
            height: 160px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 1.5rem;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #FF7500;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 117, 0, 0.2);
        }

        /* Botão de Sortear */
        button {
            background-color: #FF7500;
            color: #ffffff;
            border: none;
            padding: 14px 32px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            width: 100%;
        }

        button:hover {
            background-color: #e66a00;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Área do Resultado */
        #resultado {
            margin-top: 2rem;
            font-size: 1.3rem;
            color: #000000;
            min-height: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .nome-sorteado {
            color: #FF7500;
            font-size: 2.2rem;
            font-weight: 900;
            margin-top: 10px;
            text-transform: uppercase;
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Animação suave para exibir o ganhador */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuabcxvJJvQU8EvzkLDXTzlg__yU1Mtghx3A&s" alt="Atitude Kids Logo" class="logo">
        
        <h1>Maleta Viajante</h1>
        <p>Cole a lista de crianças abaixo (um nome por linha):</p>
        
        <textarea id="listaNomes" placeholder="Exemplo:&#10;Davi&#10;Manuela&#10;Miguel&#10;Alice..."></textarea>
        
        <button onclick="realizarSorteio()">Sortear Agora</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        function realizarSorteio() {
            const textarea = document.getElementById('listaNomes');
            const resultadoDiv = document.getElementById('resultado');

            // Captura os nomes, divide por quebra de linha, remove espaços em branco extras e ignora linhas vazias
            const nomes = textarea.value.split('\n')
                                        .map(nome => nome.trim())
                                        .filter(nome => nome !== '');

            // Validação caso o campo esteja vazio
            if (nomes.length === 0) {
                resultadoDiv.innerHTML = '<span style="color: red; font-size: 1rem;">Por favor, insira pelo menos um nome na lista antes de sortear.</span>';
                return;
            }

            // Cria um pequeno efeito de "suspense" (Meio segundo)
            resultadoDiv.innerHTML = '<span style="color: #888;">Embaralhando os nomes... 🎲</span>';
            
            setTimeout(() => {
                // Lógica de sorteio aleatório
                const indiceSorteado = Math.floor(Math.random() * nomes.length);
                const vencedor = nomes[indiceSorteado].toUpperCase();

                // Exibe a mensagem final formatada
                resultadoDiv.innerHTML = `O sorteado da semana para receber a Maleta Viajante é: <span class="nome-sorteado">${vencedor}</span>`;
            }, 600);
        }
    </script>

</body>
</html>
